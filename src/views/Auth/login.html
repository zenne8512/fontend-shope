<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - OX En Provence</title>
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg,#070707,#0f0f0f);
            display: flex;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            color: #f3e9d6;
        }

        /* ── Simple top bar ── */
        .auth-topbar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .auth-topbar-logo a {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--primary-color, #EBC351);
            text-decoration: none;
            background: linear-gradient(90deg, #f7e9cf 0%, var(--primary-color, #EBC351) 45%, #f7e9cf 85%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoTextShimmer 3s linear infinite;
        }
        .auth-topbar-logo span {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: 3px;
            font-weight: 400;
            background: none;
            -webkit-text-fill-color: rgba(255,255,255,0.5);
        }
        .auth-topbar-back a {
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.18s ease;
            transform-origin: left center;
        }
        .auth-topbar-back a:hover { color: var(--primary-color, #EBC351); transform: translateX(-4px); }

        /* ── Main layout ── */
        .auth-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px 60px;
        }
        .auth-card-new {
            width: 100%;
            max-width: 520px;
            background: linear-gradient(180deg,#0b0b0b,#121212);
            border: 1px solid rgba(235,195,81,0.08);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 40px 120px rgba(0,0,0,0.7);
        }

        /* ── Card header ── */
        .auth-card-header {
            padding: 40px 40px 0;
            text-align: center;
        }
        .auth-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #f7e9cf;
            margin-bottom: 8px;
        }
        .auth-card-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 28px;
        }

        /* ── Tabs ── */
        .auth-tabs-new {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin: 0 40px;
        }
        .auth-tab-new {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
            letter-spacing: 0.5px;
        }
        .auth-tab-new.active { color: var(--primary-color, #EBC351); }
        .auth-tab-new.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 20%;
            width: 60%; height: 3px;
            background: linear-gradient(90deg,var(--primary-color, #EBC351), #D8AD30);
            border-radius: 2px;
            box-shadow: 0 6px 18px rgba(235,195,81,0.12);
        }

        /* ── Form ── */
        .auth-form-new {
            padding: 32px 40px 40px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-field label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        .form-field-input {
            position: relative;
        }
        .form-field-input i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 15px;
        }
        .form-field input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 14px 16px 14px 44px;
            font-size: 14px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            outline: none;
        }
        .form-field input::placeholder { color: rgba(255,255,255,0.25); }
        .form-field input:focus {
            border-color: var(--primary-color, #EBC351);
            background: rgba(235,195,81,0.04);
            box-shadow: 0 8px 30px rgba(235,195,81,0.06);
        }

        /* ── Options row ── */
        .form-options-new {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12.5px;
            margin-top: -4px;
        }
        .form-options-new label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
        }
        .form-options-new input[type="checkbox"] {
            accent-color: #EBC351;
            width: 15px; height: 15px;
        }
        .form-options-new a {
            color: #EBC351;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .form-options-new a:hover { opacity: 0.7; }

        /* ── Submit button ── */
        .auth-submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color, #EBC351), var(--primary-hover, #D8AD30));
            color: #0a0a0a;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.22s ease;
            font-family: 'Montserrat', sans-serif;
        }
        .auth-submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 48px rgba(235,195,81,0.2);
        }

        /* ── Divider ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .auth-divider span {
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            white-space: nowrap;
        }

        /* ── Social buttons ── */
        .social-btns-new {
            display: flex;
            gap: 12px;
        }
        .social-btn-new {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
        }
        .social-btn-new:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.18);
            color: #fff;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        /* ── Footer note ── */
        .auth-footer-note {
            text-align: center;
            padding: 20px 40px 28px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .auth-footer-note a {
            color: #EBC351;
            text-decoration: none;
        }

        /* ── Background decoration ── */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -10%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(235,195,81,0.06) 0%, transparent 60%);
            pointer-events: none;
            filter: blur(18px);
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -18%;
            left: -8%;
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, rgba(235,195,81,0.04) 0%, transparent 65%);
            pointer-events: none;
            filter: blur(12px);
        }

        @keyframes logoTextShimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @media (max-width: 540px) {
            .auth-topbar { padding: 16px 20px; }
            .auth-card-header { padding: 28px 24px 0; }
            .auth-tabs-new { margin: 0 24px; }
            .auth-form-new { padding: 24px 24px 32px; }
            .auth-footer-note { padding: 16px 24px 22px; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="auth-topbar">
        <div class="auth-topbar-logo">
            <a href="../../../index.html">OX<span>EN PROVENCE</span></a>
        </div>
        <div class="auth-topbar-back">
            <a href="../../../index.html"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
        </div>
    </div>

    <!-- Auth Card -->
    <main class="auth-main">
        <div class="auth-card-new">
            <div class="auth-card-header">
                <h1 class="auth-card-title">Chào mừng trở lại</h1>
                <p class="auth-card-sub">Đăng nhập để khám phá ưu đãi độc quyền dành cho bạn</p>
            </div>

            <div class="auth-tabs-new">
                <div class="auth-tab-new active" id="tab-login" onclick="switchTab('login')">Đăng nhập</div>
                <div class="auth-tab-new" id="tab-register" onclick="switchTab('register')">Đăng ký</div>
            </div>

            <!-- Login Form -->
            <form class="auth-form-new" id="form-login">
                <div class="form-field">
                    <label for="login-email">Email / Số điện thoại</label>
                    <div class="form-field-input">
                        <i class="far fa-envelope"></i>
                        <input type="text" id="login-email" placeholder="Nhập email hoặc số điện thoại" required>
                    </div>
                </div>
                <div class="form-field">
                    <label for="login-password">Mật khẩu</label>
                    <div class="form-field-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Nhập mật khẩu" required>
                    </div>
                </div>
                <div class="form-options-new">
                    <label><input type="checkbox" checked> Ghi nhớ đăng nhập</label>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="auth-submit-btn">Đăng nhập</button>
                <div class="auth-divider"><span>Hoặc tiếp tục với</span></div>
                <div class="social-btns-new">
                    <button type="button" class="social-btn-new">
                        <i class="fab fa-google" style="color:#DB4437;"></i> Google
                    </button>
                    <button type="button" class="social-btn-new">
                        <i class="fab fa-facebook-f" style="color:#4267B2;"></i> Facebook
                    </button>
                </div>
            </form>

            <!-- Register Form -->
            <form class="auth-form-new" id="form-register" style="display:none;">
                <div class="form-field">
                    <label for="reg-name">Họ và tên</label>
                    <div class="form-field-input">
                        <i class="far fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Nhập họ và tên của bạn" required>
                    </div>
                </div>
                <div class="form-field">
                    <label for="reg-email">Email</label>
                    <div class="form-field-input">
                        <i class="far fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="Nhập địa chỉ email" required>
                    </div>
                </div>
                <div class="form-field">
                    <label for="reg-password">Mật khẩu</label>
                    <div class="form-field-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Tối thiểu 8 ký tự" required>
                    </div>
                </div>
                <div class="form-options-new">
                    <label><input type="checkbox" required> Tôi đồng ý với <a href="#">Điều khoản & Bảo mật</a></label>
                </div>
                <button type="submit" class="auth-submit-btn">Tạo tài khoản</button>
                <div class="auth-divider"><span>Hoặc đăng ký với</span></div>
                <div class="social-btns-new">
                    <button type="button" class="social-btn-new">
                        <i class="fab fa-google" style="color:#DB4437;"></i> Google
                    </button>
                    <button type="button" class="social-btn-new">
                        <i class="fab fa-facebook-f" style="color:#4267B2;"></i> Facebook
                    </button>
                </div>
            </form>

            <div class="auth-footer-note">
                © 2026 <strong style="color:rgba(255,255,255,0.4);">OX En Provence</strong>. Bảo mật bởi SSL · <a href="#">Chính sách bảo mật</a>
            </div>
        </div>
    </main>

    <script src="../../utils/api.js"></script>
    <script>
        function switchTab(tab) {
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('form-login').style.display = 'none';
            document.getElementById('form-register').style.display = 'none';
            if (tab === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('form-login').style.display = 'flex';
                document.querySelector('.auth-card-title').textContent = 'Chào mừng trở lại';
                document.querySelector('.auth-card-sub').textContent = 'Đăng nhập để khám phá ưu đãi độc quyền dành cho bạn';
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('form-register').style.display = 'flex';
                document.querySelector('.auth-card-title').textContent = 'Tạo tài khoản mới';
                document.querySelector('.auth-card-sub').textContent = 'Tham gia cộng đồng OX và nhận voucher 50K ngay hôm nay';
            }
        }

        // Nếu đã đăng nhập, chuyển về trang chủ luôn
        if (Auth.isLoggedIn()) {
            window.location.href = '../../../index.html';
        }

        // Form Đăng nhập
        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.auth-submit-btn');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showMsg('Vui lòng nhập đầy đủ email và mật khẩu.', 'error'); return; }
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đăng nhập...';
            btn.disabled = true;
            try {
                await Auth.login(email, password);
                showMsg('✔ Đăng nhập thành công! Đang chuyển hướng...', 'success');
                setTimeout(() => { window.location.href = '../../../index.html'; }, 1000);
            } catch (err) {
                showMsg(err.message || 'Email hoặc mật khẩu không đúng.', 'error');
                btn.textContent = 'ĐĂNG NHẬP';
                btn.disabled = false;
            }
        });

        // Form Đăng ký
        document.getElementById('form-register').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.auth-submit-btn');
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            if (!name) { showMsg('Vui lòng nhập họ và tên.', 'error'); return; }
            if (!email) { showMsg('Vui lòng nhập địa chỉ email.', 'error'); return; }
            if (password.length < 6) { showMsg('Mật khẩu phải có ít nhất 6 ký tự.', 'error'); return; }
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tạo tài khoản...';
            btn.disabled = true;
            try {
                await Auth.register(email, password, name);
                showMsg('✔ Tạo tài khoản thành công! Đang chuyển hướng...', 'success');
                setTimeout(() => { window.location.href = '../../../index.html'; }, 1200);
            } catch (err) {
                showMsg(err.message || 'Đăng ký thất bại, vui lòng thử lại.', 'error');
                btn.textContent = 'TẠO TÀI KHOẢN';
                btn.disabled = false;
            }
        });

        function showMsg(msg, type = 'success') {
            const existing = document.getElementById('auth-msg');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.id = 'auth-msg';
            div.style.cssText = `
                position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
                background:${type === 'error' ? '#c0392b' : '#27ae60'};
                color:#fff;padding:12px 28px;border-radius:50px;
                font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;
                box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:9999;
            `;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div && div.remove(), 3000);
        }
    </script>
</body>
</html>
